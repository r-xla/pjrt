on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}

    name: ${{ matrix.config.os }} - ${{ matrix.config.platform }} (${{ matrix.config.r }})${{ matrix.config.depends_only && ' – noSuggests' || '' }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: "macos", r: "release", platform: "cpu" }
          - { os: "ubuntu", r: "release", platform: "cpu" }
          - { os: "ubuntu", r: "release", platform: "cpu", depends_only: true}
          - { os: "ubuntu", platform: "cuda"}
          - { os: "windows", r: "release", platform: "cpu"}
          - { os: "macos", platform: "metal"}

        include:
          - config: {os: "ubuntu", platform: "cuda"}
            container: {image: 'sebffischer/anvil-cuda-base:latest', options: '--gpus all --runtime=nvidia'}
            runner: ['self-hosted', 'gpu']
          - config: {os: "ubuntu", platform: "cpu"}
            runner: 'ubuntu-latest'
          - config: {os: "macos", platform: "cpu"}
            runner: 'macos-latest'
            setup: |
              brew install protobuf@21
              brew link protobuf@21 --force --overwrite
          - config: {os: "windows"}
            runner: 'windows-latest'
          - config: {os: "macos", platform: "metal"}
            runner: ['self-hosted', 'metal']
            setup: |
              brew install protobuf@21
              brew link protobuf@21 --force --overwrite

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      PJRT_PLATFORM: ${{ matrix.config.platform }}

    steps:
      - name: Setup
        if: ${{ matrix.setup }}
        run: ${{ matrix.setup }}

      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        if: matrix.config.r != null
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          extra-repositories: https://r-xla.r-universe.dev

      - uses: r-xla/actions/r-check@main
        with:
          depends-only: ${{ matrix.config.depends_only == true }}
          extra-deps: ${{ matrix.extra-deps }}
