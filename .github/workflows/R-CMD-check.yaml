on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      manual-cuda:
        description: >
          Install CUDA libraries manually instead of using the cuda R package.
          Use this when upgrading PJRT plugins before the cuda R package is
          updated.
        type: boolean
        default: false

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}

    name: ${{ matrix.config.os }} - ${{ matrix.config.platform }} (${{ matrix.config.r }})${{ matrix.config.depends_only && ' – noSuggests' || '' }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: "macos", r: "release", platform: "cpu" }
          - { os: "ubuntu", r: "release", platform: "cpu" }
          - { os: "ubuntu", r: "release", platform: "cpu", depends_only: true}
          - { os: "ubuntu", r: "release", platform: "cuda"}
          - { os: "windows", r: "release", platform: "cpu"}
          - { os: "ubuntu-arm", r: "release", platform: "cpu"}
          - { os: "macos", platform: "metal"}

        include:
          - config: {os: "ubuntu", platform: "cuda"}
            container:
              image: ${{ (inputs.manual-cuda || contains(github.event.pull_request.labels.*.name, 'manual-cuda')) && 'nvidia/cuda:12.9.1-cudnn-devel-ubuntu24.04' || 'nvidia/cuda:12.9.1-runtime-ubuntu24.04' }}
              options: '--gpus all --runtime=nvidia'
            runner: ['self-hosted', 'gpu']
            extra-packages: ${{ (inputs.manual-cuda || contains(github.event.pull_request.labels.*.name, 'manual-cuda')) && 'any::rcmdcheck' || 'any::rcmdcheck, cuda12.9' }}
            extra-repositories: "https://r-xla.r-universe.dev, https://mlverse.r-universe.dev"
            as-cran: 'false'
          - config: {os: "ubuntu", platform: "cpu"}
            runner: 'ubuntu-latest'
          - config: {os: "ubuntu-arm", platform: "cpu"}
            runner: 'ubuntu-24.04-arm'
          - config: {os: "macos", platform: "cpu"}
            runner: 'macos-latest'
            setup: |
              brew install protobuf@21
              brew link protobuf@21 --force --overwrite
          - config: {os: "windows"}
            runner: 'windows-latest'
          - config: {os: "macos", platform: "metal"}
            runner: ['self-hosted', 'metal']
            setup: |
              brew install protobuf@21
              brew link protobuf@21 --force --overwrite

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      PJRT_PLATFORM: ${{ matrix.config.platform }}

    steps:
      - name: Setup
        if: ${{ matrix.setup }}
        run: ${{ matrix.setup }}

      - name: Install system dependencies for container
        if: ${{ matrix.container }}
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y devscripts curl wget git sudo pkg-config \
            libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev \
            libfreetype6-dev libharfbuzz-dev libfribidi-dev libpng-dev \
            libtiff5-dev libjpeg-dev pandoc qpdf cmake protobuf-compiler \
            libprotobuf-dev locales
          sed -i 's/# en_US.UTF-8/en_US.UTF-8/' /etc/locale.gen
          locale-gen en_US.UTF-8
          update-locale LANG=en_US.UTF-8
          echo "LANG=en_US.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=en_US.UTF-8" >> $GITHUB_ENV

      - name: Install CUDA libraries manually
        if: ${{ (inputs.manual-cuda || contains(github.event.pull_request.labels.*.name, 'manual-cuda')) && matrix.config.platform == 'cuda' }}
        shell: bash
        run: |
          cd /tmp
          wget https://developer.download.nvidia.com/compute/nvshmem/3.2.5/local_installers/nvshmem-local-repo-ubuntu2404-3.2.5_3.2.5-1_amd64.deb
          sudo dpkg -i nvshmem-local-repo-ubuntu2404-3.2.5_3.2.5-1_amd64.deb
          sudo cp /var/nvshmem-local-repo-ubuntu2404-3.2.5/nvshmem-*-keyring.gpg /usr/share/keyrings/
          sudo apt-get update
          sudo apt-get -y --allow-change-held-packages install \
            libnccl2=2.28.9-1+cuda12.9 libnccl-dev=2.28.9-1+cuda12.9 \
            libnvshmem3-cuda-12=3.2.5-1 \
            libnvshmem3-static-cuda-12=3.2.5-1 \
            libnvshmem3-dev-cuda-12=3.2.5-1

      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        if: matrix.config.r != null
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          extra-repositories: ${{ matrix.extra-repositories || 'https://r-xla.r-universe.dev' }}

      - uses: r-xla/actions/r-check@main
        with:
          depends-only: ${{ matrix.config.depends_only == true }}
          extra-deps: ${{ matrix.extra-deps }}
          as-cran: ${{ matrix.as-cran || 'true' }}
          extra-packages: ${{ matrix.extra-packages || 'any::rcmdcheck' }}
