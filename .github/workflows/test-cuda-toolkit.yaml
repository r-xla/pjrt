# Tests the CUDA backend using cudatoolkit R packages instead of the
# nvidia/cuda Docker image. The container only provides the NVIDIA driver;
# CUDA runtime, cuBLAS, and cuDNN come from R packages.
on:
  push:
    branches: [main, master]
  pull_request:

name: test-cuda-toolkit

permissions: read-all

jobs:
  test:
    runs-on: ['self-hosted', 'gpu']
    # Minimal NVIDIA base image — provides only the driver runtime.
    # CUDA libraries are supplied by the cuda.* R packages.
    container:
      image: nvidia/cuda:12.8.1-base-ubuntu24.04
      options: '--gpus all --runtime=nvidia'

    name: CUDA via cudatoolkit R packages

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      PJRT_PLATFORM: cuda
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install system dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            sudo \
            software-properties-common apt-utils tzdata locales \
            libpng-dev pkg-config wget curl \
            libprotobuf-dev protobuf-compiler \
            devscripts

      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
          extra-repositories: https://r-xla.r-universe.dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          cache: false

      - name: Install CUDA toolkit R packages
        run: |
          # Pin to CUDA 12.8 versions to match the PJRT plugin.
          Rscript -e '
            cuda_repo <- "https://cudatoolkit-repo.dfalbel.workers.dev/linux-x64"
            install_version <- function(pkg, version) {
              remotes::install_version(
                pkg, version = version,
                repos = cuda_repo
              )
            }
            install.packages("remotes")
            install_version("cuda.runtime", "12.8.90")
            install_version("cuda.cublas", "12.8.4.1")
            install_version("cuda.cupti", "12.8.90")
            install_version("cuda.nvrtc", "12.8.61")
            install_version("cuda.cufft", "11.3.3.41")
            install_version("cuda.cusolver", "11.7.2.55")
            install_version("cuda.cusparse", "12.5.7.53")
            install_version("cuda.nvjitlink", "12.8.61")
            install_version("cuda.cudnn", "9.8.0.87")
            install_version("cuda.nccl", "2.25.1")
            install_version("cuda.nvshmem", "3.4.5")
          '

      - name: Install extra deps
        run: |
          Rscript -e 'install.packages("remotes")'
          Rscript -e 'remotes::install_github("r-xla/tengen")'
          Rscript -e 'remotes::install_github("r-xla/xlamisc")'

      - name: Register CUDA libraries with ldconfig
        run: |
          Rscript -e '
            paths <- c(
              cuda.runtime::cuda_runtime_lib_path(),
              cuda.cublas::cuda_cublas_lib_path(),
              cuda.cudnn::cuda_cudnn_lib_path(),
              cuda.cupti::cuda_cupti_lib_path(),
              cuda.nvrtc::cuda_nvrtc_lib_path(),
              cuda.cufft::cuda_cufft_lib_path(),
              cuda.cusolver::cuda_cusolver_lib_path(),
              cuda.cusparse::cuda_cusparse_lib_path(),
              cuda.nvjitlink::cuda_nvjitlink_lib_path(),
              cuda.nccl::cuda_nccl_lib_path(),
              cuda.nvshmem::cuda_nvshmem_lib_path()
            )
            writeLines(paths, "/etc/ld.so.conf.d/cuda-r-packages.conf")
          '
          # Symlink non-lib-prefixed nvshmem .so files into /usr/local/lib
          # so the dynamic linker can find them (ldconfig only indexes lib*.so*)
          nvshmem_lib=$(Rscript -e 'cat(cuda.nvshmem::cuda_nvshmem_lib_path())')
          for f in "${nvshmem_lib}"/nvshmem_*.so*; do
            ln -sf "$f" "/usr/local/lib/$(basename "$f")"
          done
          ldconfig
          ldconfig -p | grep -E "nvrtc|cublas|cudnn|cupti|cufft|cusolver|cusparse|nvjitlink|nccl|nvshmem|cudart"

      - name: Verify GPU is available
        run: nvidia-smi

      - uses: r-xla/actions/r-check@main
