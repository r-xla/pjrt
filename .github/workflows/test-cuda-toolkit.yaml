# Tests the CUDA backend using the cuda12.8 R package instead of the
# nvidia/cuda Docker image. The container only provides the NVIDIA driver;
# all CUDA libraries come from the R package.
on:
  push:
    branches: [main, master]
  pull_request:

name: test-cuda-toolkit

permissions: read-all

jobs:
  test:
    runs-on: ['self-hosted', 'gpu']
    # Minimal NVIDIA base image — provides only the driver runtime.
    # CUDA libraries are supplied by the cuda12.8 R package.
    container:
      image: nvidia/cuda:12.8.1-base-ubuntu24.04
      options: '--gpus all --runtime=nvidia'

    name: CUDA via cuda12.8 R package

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      PJRT_PLATFORM: cuda
      CUDA_R_PACKAGE: cuda12.8
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install system dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            sudo \
            software-properties-common apt-utils tzdata locales \
            libpng-dev pkg-config wget curl \
            libprotobuf-dev protobuf-compiler \
            devscripts

      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
          extra-repositories: https://r-xla.r-universe.dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          cache: false

      - name: Install extra deps
        run: |
          Rscript -e 'install.packages("remotes")'
          Rscript -e 'remotes::install_github("r-xla/xlamisc")'

      - name: Verify GPU is available
        run: nvidia-smi

      - name: Install pjrt from source
        run: R CMD INSTALL .

      - name: Test CUDA plugin loads and runs
        run: |
          Rscript -e '
            library(pjrt)
            cat("Loading CUDA plugin...\n")
            plugin <- pjrt_plugin("cuda")
            cat("Plugin loaded!\n")
            client <- plugin_client_create(plugin, "cuda")
            cat("Client created!\n")

            # Simple StableHLO program: add two scalars
            src <- "
            func.func @main(%arg0: tensor<f32>, %arg1: tensor<f32>) -> tensor<f32> {
              %0 = stablehlo.add %arg0, %arg1 : tensor<f32>
              return %0 : tensor<f32>
            }
            "
            program <- pjrt_program(src = src)
            compiled <- pjrt_compile(program)
            a <- pjrt_scalar(1.0)
            b <- pjrt_scalar(2.0)
            result <- pjrt_execute(compiled, a, b)
            cat("1.0 + 2.0 =", as.numeric(as_array(result)), "\n")
          '

      - uses: r-xla/actions/r-check@main
